# [![Deploy Jekyll with GitHub Pages dependencies preinstalled](https://github.com/Elparadisogonzalo/Assets3/actions/workflows/jekyll-gh-pages.yml/badge.svg)](https://github.com/Elparadisogonzalo/Assets3/actions/workflows/jekyll-gh-pages.yml).github/dependabot.yml
version: 2
updates:
  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/sdcard/Elparadisogonzalo/home/Assets3-1e473f24/.github/" # Location of .github/workflows
    schedule:
      interval: "minutes"

  # NPM (Node.js) dependencies
  - package-ecosystem: "npm"
    directory: "/storage/79F3-B38F/Android" # Change if your package.json is in a subdirectory
    schedule:
      interval: "immediately"
    open-pull-requests-limit: 1000
    commit-message:
      prefix: "deps"
      include: "scope"
    include: "publish"
