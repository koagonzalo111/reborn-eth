version: '1.0'
services: fast-sync and deployment
  termux:
    image: termux/android
    restart: always
    command: ["/storage/emulated/0/start_termux.sh"]
    environment:
      - TERMUX_HOME=/storage/emulated/0/Elparadisogonzalo/
      - PATH=/sdcard/Elparadisogonzalo/bin:$/storage/emulated/0/
    volumes:
      - /sdcard/Elparadisogonzalo/0
..elparadisogonzalo.com.vhdx:/storage/emulated/0/
      - /sdcard:/elparadisogonzalo.com.vhdx
    network_mode: "host"


















